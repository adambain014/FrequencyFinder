<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tram Route Frequency</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      padding: 2rem;
      min-height: 100vh;
    }
    .page { max-width: 720px; margin: 0 auto; }

    .route-selector {
        padding-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .route-selector label { font-size: 13px; color: #5F5E5A; font-weight: 500; white-space: nowrap; }
    .route-selector select {
      padding: 8px 12px;
      border: 0.5px solid #c8c5be;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      color: #1a1a18;
      cursor: pointer;
      min-width: 180px;
    }
    .route-selector select:focus { outline: none; border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }

    header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .route-badge {
      width: 56px; height: 56px;
      border-radius: 20px;
      background: #185FA5;
      color: #fff;
      font-size: 22px;
      font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.25s;
    }
    header h1 { font-size: 22px; font-weight: 500; }
    header p  { font-size: 14px; color: #5F5E5A; margin-top: 2px; }

    .section-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: #888780; margin: 0 0 0.75rem;
    }

    .peak-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 2rem; }
    .peak-card { background: #fff; border: 0.5px solid #e0ddd6; padding: 1rem 1.25rem; }
    .peak-card .label { font-size: 13px; color: #5F5E5A; margin-bottom: 6px; }
    .peak-card .value { font-size: 28px; font-weight: 500; }
    .peak-card .unit  { font-size: 14px; font-weight: 400; color: #888780; margin-left: 2px; }

    .freq-card { background: #fff; border: 0.5px solid #e0ddd6;  overflow: hidden; margin-bottom: 2rem; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      background: #f5f5f3; padding: 10px 16px; text-align: left;
      font-weight: 500; font-size: 13px; color: #5F5E5A; border-bottom: 0.5px solid #e0ddd6;
    }
    thead th:not(:first-child) { text-align: center; }
    tbody tr { border-bottom: 0.5px solid #f0ede6; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 12px 16px; color: #1a1a18; }
    tbody td:not(:first-child) { text-align: center; }
    .day-label { font-weight: 500; }

    .freq-pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 13px; font-weight: 500; min-width: 52px; text-align: center;
    }

    #content { display: none; }
    .placeholder { text-align: center; padding: 4rem 2rem; color: #888780; font-size: 15px; }
    .placeholder svg { margin-bottom: 1rem; opacity: 0.35; }
    .error { padding: 1.5rem; background: #FCEBEB; border-radius: 12px; color: #A32D2D; font-size: 14px; }

    .legend {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 0.75rem;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #5F5E5A;
    }
    .legend-swatch {
      width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
    }
    
    #span-chart { width: 100% !important; }
  </style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<body>
  <style>
    .top-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1rem;
      height: 60px;
      border-bottom: 1px solid #ddd;
      z-index: 30;
      background: #f4f4f0;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    
    .top-bar-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      transform: translateY(-20px); 
    }
    
    .top-bar h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.01em;
      white-space: nowrap;
      margin: 0;   /* IMPORTANT */
    }
    
    .top-bar .subtitle {
      display: block;
      font-size: 1.2rem;
      color: #999;
      white-space: nowrap;
      margin: 0;
      line-height: 1.1;
    }
</style>

<body>
<div class="top-bar">
  <div class="top-bar-center">  
    <h1>FrequencyFinder</h1>
    <span class="subtitle">Unofficial - Current as of May 2026 - by Adam Bain - TRAMS ONLY FOR NOW</span>
  </div>
</div>

<div class="page">

  <div class="route-selector">
    <label for="route-select">Select route</label>
    <select id="route-select">
      <option value="">— choose a route —</option>
    </select>
  </div>

  <div id="placeholder" class="placeholder">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
    <p>Choose a route to view its frequency summary.</p>
  </div>

  <div id="content">
    <header>
      <div class="route-badge" id="route-badge">—</div>
      <div>
        <h1 id="route-title">Route —</h1>
        <p>Frequency Summary</p>
      </div>
    </header>

    <p class="section-label">Average Frequency by Time of Day</p>
    <div class="legend" id="freq-legend"></div>
    <div class="freq-card">
      <table>
        <thead>
          <tr>
            <th>Day</th>
            <th>Morning<br><span style="font-weight:400;font-size:11px">7–8 am</span></th>
            <th>Daytime<br><span style="font-weight:400;font-size:11px">12–1 pm</span></th>
            <th>Evening<br><span style="font-weight:400;font-size:11px">9–10 pm</span></th>
          </tr>
        </thead>
        <tbody id="freq-body"></tbody>
      </table>
    </div>
    
    <p class="section-label"> Weekday Peak Frequencies</p>
    <div class="peak-grid" id="peak-grid"></div>
    
    <p class="section-label">Service Span</p>
      <div class="freq-card" style="padding: 1rem 1.25rem;">
        <canvas id="span-chart" height="220"></canvas>
      </div>
  </div>

</div>
<script>
const FOLDER = 'route_jsons';

// Frequency colour scale — background colour, text colour, label
// Keyed by upper bound (minutes). Order matters: first match wins.
const FREQ_SCALE = [
  { max: 10, bg: '#671415', fg: '#ffffff', label: '≤ 10 min' },
  { max: 15, bg: '#a62624', fg: '#ffffff', label: '≤ 15 min' },
  { max: 20, bg: '#642d91', fg: '#ffffff', label: '≤ 20 min' },
  { max: 30, bg: '#2c8ab8', fg: '#ffffff', label: '≤ 30 min' },
  { max: 60, bg: '#5d9a9d', fg: '#ffffff', label: '≤ 60 min' },
  { max: Infinity, bg: '#8d6f32', fg: '#ffffff', label: '> 60 min' },
];

function freqStyle(mins) {
  if (mins == null) return null;
  return FREQ_SCALE.find(s => mins <= s.max) ?? FREQ_SCALE[FREQ_SCALE.length - 1];
}

function pill(val) {
  if (val == null) return '<span style="color:#888">—</span>';
  const s = freqStyle(val);
  return `<span class="freq-pill" style="background:${s.bg};color:${s.fg}">${val} min</span>`;
}

// Ensure hex has leading #
function normaliseColor(c) {
  if (!c) return '#185FA5';
  return c.startsWith('#') ? c : '#' + c;
}

// Pick white or dark text depending on bg luminance
function contrastText(hex) {
  const c = hex.replace('#', '');
  const r = parseInt(c.slice(0,2),16);
  const g = parseInt(c.slice(2,4),16);
  const b = parseInt(c.slice(4,6),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.55 ? '#1a1a18' : '#ffffff';
}

function buildLegend() {
  const el = document.getElementById('freq-legend');
  el.innerHTML = FREQ_SCALE.map(s =>
    `<div class="legend-item">
      <span class="legend-swatch" style="background:${s.bg}"></span>
      <span>${s.label}</span>
    </div>`
  ).join('');
}

function render(data) {
  const colour = normaliseColor(data.route_colour);
  const textCol = contrastText(colour);

  const badge = document.getElementById('route-badge');
  badge.textContent = data.route_number;
  badge.style.background = colour;
  badge.style.color = textCol;

  document.getElementById('route-title').textContent = `Route ${data.route_number}`;

  const peak = data.peak_medians?.[0] ?? {};
  const amVal = peak['Median AM Peak Wait'];
  const pmVal = peak['Median PM Peak Wait'];
  const amStyle = freqStyle(amVal);
  const pmStyle = freqStyle(pmVal);

  document.getElementById('peak-grid').innerHTML = `
    <div class="peak-card">
      <div class="label">AM Peak Median Wait</div>
      <div class="value" style="color:${amStyle ? amStyle.bg : colour}">${amVal ?? '—'}<span class="unit">min</span></div>
      <div style="font-size:12px;color:#888780;margin-top:4px">7:00 – 9:00 am</div>
    </div>
    <div class="peak-card">
      <div class="label">PM Peak Median Wait</div>
      <div class="value" style="color:${pmStyle ? pmStyle.bg : colour}">${pmVal ?? '—'}<span class="unit">min</span></div>
      <div style="font-size:12px;color:#888780;margin-top:4px">4:00 – 7:00 pm</div>
    </div>`;

  document.getElementById('freq-body').innerHTML = (data.frequency_summary ?? []).map(row => `
    <tr>
      <td class="day-label">${row.day}</td>
      <td>${pill(row.morning)}</td>
      <td>${pill(row.daytime)}</td>
      <td>${pill(row.evening)}</td>
    </tr>`).join('');

  buildLegend();

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function loadRoute(num) {
  fetch(`${FOLDER}/${num}.json`)
    .then(r => { if (!r.ok) throw new Error(`${num}.json not found`); return r.json(); })
    .then(render)
    .catch(err => {
      document.getElementById('placeholder').style.display = 'block';
      document.getElementById('placeholder').innerHTML =
        `<div class="error">Could not load route ${num}: ${err.message}</div>`;
      document.getElementById('content').style.display = 'none';
    });
}

function populateSelect(routes) {
  const sel = document.getElementById('route-select');
  routes.sort((a, b) => {
    const na = parseInt(a), nb = parseInt(b);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return a.localeCompare(b);
  });
  routes.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = `Route ${r}`;
    sel.appendChild(opt);
  });
}

document.getElementById('route-select').addEventListener('change', e => {
  if (e.target.value) loadRoute(e.target.value);
});

fetch(`${FOLDER}/manifest.json`)
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(manifest => populateSelect(manifest.routes))
  .catch(() => {
    document.getElementById('placeholder').innerHTML =
      `<div class="error">Could not load <code>route_jsons/manifest.json</code>. Run the R manifest snippet to generate it.</div>`;
  });
  
  let spanChart = null;

function minsToTime(m) {
  const h = Math.floor(m / 60) % 24;
  const min = m % 60;
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}

function buildSpanChart(spanStats, routeColour) {
  const DAY_ORDER = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  const DAY_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const sorted = DAY_ORDER.map(d => spanStats.find(r => r.day === d)).filter(Boolean);

  const spanData             = sorted.map(r => [r.span_start / 60, r.span_end / 60]);
  const coverageData         = sorted.map(r => [r.full_coverage_start / 60, r.full_coverage_end / 60]);
  const midnightSpanData     = sorted.map(r =>
    r.midnight_span_start != null ? [r.midnight_span_start / 60, r.midnight_span_end / 60] : null
  );
  const midnightCoverageData = sorted.map(r =>
    r.full_midnight_coverage_start != null ? [r.full_midnight_coverage_start / 60, r.full_midnight_coverage_end / 60] : null
  );

  if (spanChart) spanChart.destroy();

  const ctx = document.getElementById('span-chart').getContext('2d');
  spanChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: DAY_LABELS,
      datasets: [
                {
          label: 'Full Span (Early Morning)',
          data: midnightSpanData,
          backgroundColor: routeColour + '80',
          barPercentage: 1,
          categoryPercentage: 0.6,
        },
        {
          label: 'All Stops Served (Early Morning)',
          data: midnightCoverageData,
          backgroundColor: routeColour,
          barPercentage: 1,
          categoryPercentage: 0.6,
        },
        {
          label: 'Full Span',
          data: spanData,
          backgroundColor: routeColour + '80',
          barPercentage: 1,
          categoryPercentage: 0.6,
        },
        {
          label: 'All Stops Served',
          data: coverageData,
          backgroundColor: routeColour,
          barPercentage: 1,
          categoryPercentage: 0.6,
        }

      ]
    },
    options: {
      animation: false,
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { boxWidth: 12, font: { size: 12 }, color: '#5F5E5A' }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (!ctx.raw) return null;
              const [start, end] = ctx.raw;
              const fmt = m => {
                const wrapped = m % 24;
                const h = Math.floor(wrapped);
                const min = Math.round((wrapped - h) * 60);
                return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
              };
              return `${ctx.dataset.label}: ${fmt(start)} – ${fmt(end)}`;
            }
          }
        }
      },
      scales: {
        x: {
          min: 0, max: 24,
          ticks: {
            stepSize: 4,
            callback: v => `${String(v % 24).padStart(2,'0')}:00`,
            color: '#888780',
            font: { size: 11 }
          },
          grid: { color: '#f0ede6' }
        },
        y: {
          ticks: { color: '#1a1a18', font: { size: 12 } },
          grid: { display: false }
        }
      }
    }
  });
}

function render(data) {
  const colour  = normaliseColor(data.route_colour);
  const textCol = contrastText(colour);

  const badge = document.getElementById('route-badge');
  badge.textContent = data.route_number;
  badge.style.background = colour;
  badge.style.color = textCol;

  document.getElementById('route-title').textContent = `Route ${data.route_number}`;

  const peak   = data.peak_medians?.[0] ?? {};
  const amVal  = peak['Median AM Peak Wait'];
  const pmVal  = peak['Median PM Peak Wait'];
  const amStyle = freqStyle(amVal);
  const pmStyle = freqStyle(pmVal);

  document.getElementById('peak-grid').innerHTML = `
    <div class="peak-card">
      <div class="label">AM Peak Median Wait</div>
      <div class="value" style="color:${amStyle ? amStyle.bg : colour}">${amVal ?? '—'}<span class="unit">min</span></div>
      <div style="font-size:12px;color:#888780;margin-top:4px">7:00 – 9:00 am</div>
    </div>
    <div class="peak-card">
      <div class="label">PM Peak Median Wait</div>
      <div class="value" style="color:${pmStyle ? pmStyle.bg : colour}">${pmVal ?? '—'}<span class="unit">min</span></div>
      <div style="font-size:12px;color:#888780;margin-top:4px">4:00 – 7:00 pm</div>
    </div>`;

  document.getElementById('freq-body').innerHTML = (data.frequency_summary ?? []).map(row => `
    <tr>
      <td class="day-label">${row.day}</td>
      <td>${pill(row.morning)}</td>
      <td>${pill(row.daytime)}</td>
      <td>${pill(row.evening)}</td>
    </tr>`).join('');

  buildLegend();

  if (data.span_stats?.length) buildSpanChart(data.span_stats, colour);

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('content').style.display     = 'block';
}
</script>
</body>
</html>
